{{define "content"}}
<section class="card">
  <h1>Change password</h1>
  {{if .Error}}
    <p class="error">{{.Error}}</p>
  {{end}}
  {{if .Success}}
    <p class="subtle">{{.Success}}</p>
  {{end}}
  <form method="POST" action="/account/password">
    <label for="current_password">Current password</label>
    <input type="password" id="current_password" name="current_password" autofocus required>
    <label for="new_password">New password</label>
    <input type="password" id="new_password" name="new_password" minlength="8" maxlength="72" required>
    <label for="confirm_password">Confirm new password</label>
    <input type="password" id="confirm_password" name="confirm_password" minlength="8" maxlength="72" required>
    <button type="submit">Update password</button>
  </form>
  <a class="back-link" href="/">&larr; Back to search</a>
</section>
{{end}}

{{define "content"}}
<section class="card">
  <h1>You're in.</h1>
  <p class="subtle">The foundation is working: config, database, auth, and templates are all wired up.</p>
  <dl class="stats">
    <div><dt>Bins</dt><dd>{{.BinCount}}</dd></div>
    <div><dt>Items</dt><dd>{{.ItemCount}}</dd></div>
  </dl>
  <p class="subtle">Bin creation and item entry come next.</p>
  <form method="POST" action="/logout">
    <button type="submit" class="secondary">Sign out</button>
  </form>
</section>
{{end}}

name: Release

# Build cross-platform binaries and publish a GitHub Release automatically
# whenever a version tag (e.g. v1.2.3) is pushed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          name="binbash-${VERSION}-${GOOS}-${GOARCH}"
          bin="binbash"
          [ "$GOOS" = "windows" ] && bin="binbash.exe"
          mkdir -p "stage/${name}" dist
          go build -trimpath -ldflags="-s -w" -o "stage/${name}/${bin}" .
          cp LICENSE "stage/${name}/"
          if [ "$GOOS" = "windows" ]; then
            (cd stage && zip -qr "../dist/${name}.zip" "${name}")
          else
            tar -C stage -czf "dist/${name}.tar.gz" "${name}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and generate checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} dist/ \;
          cd dist
          sha256sum $(find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -printf '%P\n' | sort) > SHA256SUMS.txt
          echo "Checksums:"; cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

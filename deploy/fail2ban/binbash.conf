# fail2ban filter for binbash.
#
# Install to: /etc/fail2ban/filter.d/binbash.conf
#
# Matches the auth-failure line binbash writes on every rejected password
# attempt, at /login and at /settings/password alike:
#
#   binbash: auth failure from 203.0.113.9: incorrect password at /login
#   binbash: auth failure from 203.0.113.9: attempt while locked out
#
# The IP is the real client address. binbash only believes X-Forwarded-For from
# a proxy listed in its trusted_proxies setting -- so if binbash sits behind a
# reverse proxy that isn't loopback (Docker, or a proxy on another host) and you
# haven't set trusted_proxies, every line here will read as the proxy's address
# and fail2ban will end up banning your own proxy. Check the log before you
# enable the jail.

[Definition]

# Anchored to the start of the line on purpose, with the optional prefix being
# exactly Go's "2006/01/02 15:04:05 " log timestamp (kept optional because
# fail2ban strips a date it recognises before matching, and does not if it
# doesn't). Do not relax this into an unanchored search: binbash logs some
# attacker-supplied values, such as a rejected request's Origin header, and an
# unanchored pattern would let an attacker put this very marker inside one and
# have fail2ban ban any IP they name -- yours included. binbash strips
# whitespace from those values for the same reason; the anchor is the second,
# independent half of that defence.
failregex = ^(?:\S+ \S+ )?binbash: auth failure from <HOST>:

ignoreregex =

# binbash logs to stdout/stderr, which systemd captures into the journal. This
# limits the systemd backend to binbash's own unit, so nothing else on the box
# can spoof a matching line into the jail.
journalmatch = _SYSTEMD_UNIT=binbash.service
